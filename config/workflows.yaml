# Workflow Definitions — corp-by-os v0.2
# Curated multi-step pipelines executed by the workflow engine.

workflows:
  new_opportunity:
    description: "Create new opportunity — folder, deck, metadata, vault skeleton"
    trigger_phrases: ["nowe opportunity", "new opportunity", "nowy klient", "new client"]
    parameters:
      client: {type: string, required: true}
      product: {type: string, required: true}
      contact: {type: string, required: false}
    steps:
      - type: agent
        description: "Create project folder + deck + metadata"
        agent: corp-opportunity-manager
        command: ["com", "new", "{client}", "-p", "{product}"]
        conditional_args:
          contact: ["-c", "{contact}"]
      - type: python
        description: "Create vault skeleton in 01_projects/"
        action: create_vault_skeleton
      - type: python
        description: "Validate new project"
        action: validate_project
    confirmation: true
    cost_estimate: "free"

  extract_project:
    description: "Full extraction pipeline — scan, extract, render, copy to Obsidian"
    trigger_phrases: ["przetworz projekt", "extract project", "wyciagnij wiedze", "process project"]
    parameters:
      project: {type: string, required: true}
    steps:
      - type: agent
        description: "Scan and classify files"
        agent: corp-project-extractor
        command: ["cpe", "scan", "{project_path}"]
      - type: agent
        description: "Extract knowledge via CKE"
        agent: corp-project-extractor
        command: ["cpe", "extract-cke", "{project_path}", "--max-rpm", "50"]
      - type: agent
        description: "Render index + facts"
        agent: corp-project-extractor
        command: ["cpe", "render", "{project_path}"]
      - type: python
        description: "Copy knowledge to Obsidian vault"
        action: copy_to_vault
      - type: python
        description: "Validate vault output"
        action: validate_project
    confirmation: true
    cost_estimate: "$0.20/project"

  attention_scan:
    description: "Scan all projects — find stale, missing, incomplete items"
    trigger_phrases: ["co wymaga uwagi", "what needs attention", "status", "przeglad"]
    parameters: {}
    steps:
      - type: python
        description: "Scan all projects for issues"
        action: scan_attention
      - type: python
        description: "Generate attention dashboard"
        action: generate_attention_dashboard
    confirmation: false
    cost_estimate: "free"

  prep_deck:
    description: "Prepare presentation — smart template selection"
    trigger_phrases: ["przygotuj prezentacje", "prep deck", "prepare presentation", "nowa prezentacja"]
    parameters:
      project: {type: string, required: true}
      topic: {type: string, required: true}
      date: {type: string, required: false, default: "today"}
      template_id: {type: string, required: false}
    steps:
      - type: python
        description: "Select best template for topic"
        action: select_template_for_deck
      - type: python
        description: "Copy template to project folder"
        action: copy_deck_to_project
    confirmation: true
    cost_estimate: "free"

  add_task:
    description: "Create a task with deadline"
    trigger_phrases: ["dodaj task", "add task", "musze zrobic", "need to", "zaplanuj", "reminder"]
    parameters:
      title: {type: string, required: true}
      project: {type: string, required: false}
      deadline: {type: string, required: false}
      priority: {type: string, required: false, default: "medium"}
    steps:
      - type: python
        description: "Create task note in vault"
        action: add_task
    confirmation: false
    cost_estimate: "free"

  my_tasks:
    description: "Show current tasks sorted by deadline and priority"
    trigger_phrases: ["moje taski", "my tasks", "co mam zrobic", "what to do", "lista zadan"]
    parameters:
      status: {type: string, required: false, default: "todo"}
      project: {type: string, required: false}
    steps:
      - type: python
        description: "List tasks from vault"
        action: list_tasks
    confirmation: false
    cost_estimate: "free"

  archive_project:
    description: "Archive completed opportunity — move to Archive, update metadata"
    trigger_phrases: ["archiwizuj", "archive", "zamknij projekt", "close project"]
    parameters:
      project: {type: string, required: true}
      reason: {type: string, required: true}
      notes: {type: string, required: false}
    steps:
      - type: agent
        description: "Final render of project knowledge"
        agent: corp-project-extractor
        command: ["cpe", "render", "{project_path}"]
      - type: python
        description: "Move to 80_Archive/{year}/"
        action: archive_project
      - type: python
        description: "Update vault metadata"
        action: update_archive_metadata
    confirmation: true
    cost_estimate: "free"

  project_brief:
    description: "Generate 1-pager brief before a client call"
    trigger_phrases: ["brief", "brief na", "prepare brief", "podsumowanie projektu", "co wiemy o"]
    parameters:
      project: {type: string, required: true}
    steps:
      - type: python
        description: "Read facts + metadata, generate brief"
        action: generate_project_brief
    confirmation: false
    cost_estimate: "free"

  query_knowledge:
    description: "Search across all project facts"
    trigger_phrases: ["kto pytal o", "which clients", "znajdz", "search", "query", "szukaj"]
    parameters:
      query: {type: string, required: true}
      project: {type: string, required: false}
    steps:
      - type: python
        description: "Full-text search across indexed facts"
        action: query_knowledge
    confirmation: false
    cost_estimate: "free"

  show_analytics:
    description: "Cross-project analytics and patterns"
    trigger_phrases: ["analytics", "analityka", "patterns", "wzorce", "statystyki", "stats"]
    parameters: {}
    steps:
      - type: python
        description: "Generate analytics from index"
        action: show_analytics
    confirmation: false
    cost_estimate: "free"
